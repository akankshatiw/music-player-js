<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Music App</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar glass">

      <h1>Music App</h1>

      <nav>
        <p id="homeBtn">Home</p>
        <p id="favBtn">Favorites</p>
      </nav>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- SEARCH -->
      <div class="top-bar glass">
        <input type="text" id="searchInput" placeholder="Search music...">
      </div>

      <!-- ARTISTS -->
      <section class="artists-section">

        <div class="artist-header">
          <h2>Popular Artists</h2>
        </div>

        <div class="artists">

          <div class="artist-card" onclick="searchSongs('pritam')">

            <img src="https://i.scdn.co/image/ab6761610000e5ebcb6926f44f620555ba444fca">

            <h3>Pritam</h3>
            <p>Artist</p>
          </div>

          <div class="artist-card"
           onclick="searchSongs('arijit singh')">

            <img src="asserts/arjitsing.png">
            <h3>Arijit Singh</h3>
            <p>Artist</p>
          </div>

          <div class="artist-card" onclick="searchSongs('atif aslam')">

            <img src="asserts/atifaslam.png">
            <h3>Atif Aslam</h3>
            <p>Artist</p>
          </div>

          <div class="artist-card" onclick="searchSongs('weeknd')">

            <img src="https://i.scdn.co/image/ab6761610000e5eb214f3cf1cbe7139c1e26ffbb">

            <h3>The Weeknd</h3>
            <p>Artist</p>
          </div>
          <div class= "artist-card"  onclick="searchSongs('BTS')">
            <img src="asserts/bts.png" alt="BTS image">
            <h3>BTS</h3>
            <p>Artist</p>
          </div>
          <div class= "artist-card"  onclick="searchSongs('Drake')">
            <img src="asserts/drake.png" alt="drake image">
            <h3>drake </h3>
            <p>Artist</p>
          </div>
          <div class= "artist-card"  onclick="searchSongs('justin bieber')">
            <img src="asserts/justin.png" alt="justin image">
            <h3>justin bieber</h3>
            <p>Artist</p>
          </div>
          <div class= "artist-card"  onclick="searchSongs('michael jackson')">
            <img src="asserts/micheal.png" alt="michael jackson image">
            <h3>michael jackson</h3>
            <p>Artist</p>
          </div>
            <div class= "artist-card"  onclick="searchSongs('selena gomez')">
            <img src="asserts/salena.png" alt="selena gomez image">
            <h3>selena gomez</h3>
            <p>Artist</p>
          </div>
        </div>

      </section>

      <!-- SONGS -->
      <div class="cards"></div>

    </main>

  </div>

  <!-- FOOTER PLAYER -->
  <footer class="player glass">

    <div class="song-info">

      <img id="player-img" src="https://via.placeholder.com/60">

      <div>
        <h4 id="player-title">No Song Playing</h4>
        <p id="player-artist">---</p>
      </div>

    </div>

    <div class="controls">
      <button id="playBtn">▶</button>
      <button id="pauseBtn">⏸</button>
    </div>

  </footer>

<script src="script.js"></script>

</body>

</html>
